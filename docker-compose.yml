# AgentBridge backend.
#
# 1. Copy .env.example to .env and set WORKSPACE (the repo the agent should edit) plus
#    credentials (ANTHROPIC_API_KEY for Claude Code, GITHUB_TOKEN for PR creation).
# 2. docker compose up --build
# 3. Embed the widget pointing at ws://localhost:8000/ws (see widget/README.md).

services:
  backend:
    build:
      context: .                     # repo root — needed to include widget/dist
      dockerfile: backend/Dockerfile
    image: agentbridge-backend
    ports:
      - "${AGENTBRIDGE_PORT:-8000}:8000"
    environment:
      AGENTBRIDGE_WORKSPACE: /workspace
      AGENTBRIDGE_HOST: 0.0.0.0
      AGENTBRIDGE_PORT: 8000
      AGENTBRIDGE_AGENT: ${AGENTBRIDGE_AGENT:-claude-code}
      # Branch worktrees live on a named volume (off the workspace mount) so they persist
      # across restarts without showing up as untracked files in the workspace.
      AGENTBRIDGE_WORKTREE_DIR: /worktrees
      # Chat history (metadata + transcripts + resume ids) persisted on a named volume.
      AGENTBRIDGE_STATE_DIR: /state
      # Claude Code auth — use EITHER your Claude subscription OR an API key:
      #  - Subscription: run `claude setup-token` on the host and put the result in
      #    CLAUDE_CODE_OAUTH_TOKEN (no per-token API billing).
      #  - API billing: set ANTHROPIC_API_KEY. If both are set, the API key wins.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      # The repo the agent operates on. Read-write: the agent edits files and runs git here.
      - ${WORKSPACE:?set WORKSPACE in .env to the absolute path of the repo to edit}:/workspace
      # Optional: reuse the host git identity for commits (read-only).
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
      # Branch worktrees the agent operates in (kept off the workspace mount).
      - agentbridge-worktrees:/worktrees
      # Chat history, so it survives `docker compose up/down`.
      - agentbridge-state:/state
      # Claude's own session store, so "continue a previous chat" survives restarts
      # (the resume id is meaningless without the CLI's stored conversation).
      - agentbridge-claude-home:/root/.claude
    restart: unless-stopped

volumes:
  agentbridge-worktrees:
  agentbridge-state:
  agentbridge-claude-home:
